name: Build & Test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-csharp:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore C# projects
        run: dotnet restore src\Client\ProtonVPN.Client\ProtonVPN.Client.csproj /p:Platform=x64

      - name: Build C# projects
        run: dotnet build src\Client\ProtonVPN.Client\ProtonVPN.Client.csproj --no-restore -c Release /p:Platform=x64

      - name: Restore test project
        run: dotnet restore src\Client\ProtonVPN.Client.Tests\ProtonVPN.Client.Tests.csproj /p:Platform=x64

      - name: Build test project
        run: dotnet build src\Client\ProtonVPN.Client.Tests\ProtonVPN.Client.Tests.csproj --no-restore -c Release /p:Platform=x64

      - name: Run unit tests
        run: dotnet test src\Client\ProtonVPN.Client.Tests\ProtonVPN.Client.Tests.csproj --no-restore --no-build -c Release /p:Platform=x64 --logger "console;verbosity=normal"

  full-build:
    if: github.ref_name == 'main' || github.ref_name == 'master' || startsWith(github.ref_name, 'release/')
    runs-on: windows-latest
    needs: [build-csharp]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: microsoft/setup-msbuild@v2

      - name: Install C++ ATL (required for NetworkUtil)
        shell: pwsh
        run: |
          $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          $vsPath = & $vswhere -products * -requires Microsoft.Component.MSBuild -property installationPath -latest
          Write-Host "VS install path: $vsPath"

          # Always run vs_installer (idempotent) — fixes VS include path registration
          Write-Host "Installing C++ ATL component..."
          $p = Start-Process $installer -ArgumentList @('modify', "--installPath", $vsPath, '--add', 'Microsoft.VisualStudio.Component.VC.ATL', '--quiet', '--wait', '--norestart', '--nocache') -Wait -PassThru -NoNewWindow
          Write-Host "vs_installer exit code: $($p.ExitCode)"
          if ($p.ExitCode -notin @(0, 3010)) { throw "ATL install failed with code $($p.ExitCode)" }

          Write-Host "C++ ATL installed"

      - name: Install MinGW-w64 (for Go CGO)
        run: |
          choco install mingw -y --no-progress
          $mingwPath = "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"
          if (Test-Path $mingwPath) {
            echo $mingwPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          # Also check for the versioned path
          $mingwDirs = Get-ChildItem "C:\ProgramData\chocolatey\lib\mingw\tools\install\" -Directory -ErrorAction SilentlyContinue
          if ($mingwDirs) {
            $binPath = Join-Path $mingwDirs[0].FullName "bin"
            if (Test-Path $binPath) {
              echo $binPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

      - name: Build native dependencies
        shell: cmd
        run: BuildDependencies.bat publish
        env:
          PLATFORM: x64

      - name: Restore solution
        run: dotnet restore ProtonVPN.slnx

      - name: Build solution
        run: dotnet build ProtonVPN.slnx --no-restore -c Release

      - name: Run all unit tests
        run: dotnet test src\bin\*.Tests.dll --no-restore --no-build --logger "console;verbosity=normal"

      - name: Publish artifacts
        shell: cmd
        run: |
          set BUILD_PATH=src\bin\win-x64\publish
          dotnet publish src\Client\ProtonVPN.Client\ProtonVPN.Client.csproj -c Release -r win-x64 --self-contained -o %BUILD_PATH%
          dotnet publish src\ProtonVPN.Service\ProtonVPN.Service.csproj -c Release -r win-x64 --self-contained -o %BUILD_PATH%
          dotnet publish src\ProtonVPN.TlsVerify\ProtonVPN.TlsVerify.csproj -c Release -r win-x64 --self-contained -o %BUILD_PATH%
          dotnet publish src\ProtonVPN.WireGuardService\ProtonVPN.WireGuardService.csproj -c Release -r win-x64 --self-contained -o %BUILD_PATH%
          dotnet publish src\ProtonVPN.RestoreInternet\ProtonVPN.RestoreInternet.csproj -c Release -r win-x64 --self-contained -o %BUILD_PATH%
          dotnet publish src\ProtonVPN.Launcher\ProtonVPN.Launcher.csproj -c Release -r win-x64 --self-contained -o %BUILD_PATH% -p:PublishSingleFile=true
          dotnet publish src\ProtonInstaller\ProtonInstaller.csproj -c Release -r win-x64 --self-contained -o %BUILD_PATH%

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          powershell -Command "(gc Setup\SetupBase.iss) -replace '^SignTool=.*', '; SignTool=DISABLED' | sc Setup\SetupBase.iss"
          set BUILD_PATH=src\bin\win-x64\publish
          iscc Setup\Setup.x64.iss

      - uses: actions/upload-artifact@v4
        with:
          name: protonvpn-build
          path: src\bin\win-x64\publish\

      - uses: actions/upload-artifact@v4
        with:
          name: protonvpn-installer
          path: Setup\Installers\
